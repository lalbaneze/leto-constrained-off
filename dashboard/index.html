<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Leto Capital: Análise de Constrained-Off</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>

  <style>
  :root{
    --bg:#111110;          /* preto Leto */
    --card:#1A1A18;        /* card escuro quente */
    --card2:#161614;
    --border:#2e2d29;      /* borda sutil */
    --text:#F0EDE6;        /* off-white quente */
    --muted:#BDB7A7;       /* cinza Leto */
    --accent:#D8EEA9;      /* verde Leto */
    --accent2:#A7C878;     /* verde médio Leto */
    --accent3:#956A49;     /* marrom Leto */
    --input:#0D0D0C;       /* input escuro */
  }

  *{box-sizing:border-box}
  body{
    margin:0;
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    background: var(--bg);
    color:var(--text);
  }
  .container{max-width:1200px;margin:0 auto;padding:22px}

  /* Header com logo */
  .site-header{
    display:flex;
    align-items:center;
    gap:16px;
    margin-bottom:20px;
    padding-bottom:16px;
    border-bottom:1px solid var(--border);
  }
  .site-header svg{
    height:28px;
    width:auto;
    flex-shrink:0;
  }
  /* Inverte o logo preto para branco */
  .site-header svg path{
    fill: var(--text);
  }
  .header-title{
    font-size:18px;
    font-weight:500;
    color:var(--muted);
    letter-spacing:.3px;
  }
  .header-divider{
    width:1px;
    height:24px;
    background:var(--border);
  }
  .page-label{
    font-size:13px;
    font-weight:600;
    color:var(--accent);
    text-transform:uppercase;
    letter-spacing:1px;
  }

  h2{margin:0 0 12px 0;font-size:14px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
  h3{margin:0 0 4px 0;font-size:12px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
  small{color:var(--muted);font-size:11px}

  .card{
    background: var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:16px;
    margin-bottom:14px;
  }

  .card-header{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .card-meta-inline{
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  .card-meta-inline span{ opacity: 1; }

  .card-status{
    margin-top: 6px;
    font-size: 11px;
    color: var(--muted);
    text-align: right;
  }

  label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
  input,select{
    width:100%;
    padding:9px 10px;
    background: var(--input);
    color: var(--text);
    border:1px solid var(--border);
    border-radius:8px;
    outline:none;
    font-size:13px;
  }
  input::placeholder{color:rgba(189,183,167,.4)}
  input:focus,select:focus{
    border-color: rgba(216,238,169,.5);
    box-shadow: 0 0 0 3px rgba(216,238,169,.08);
  }

  button{
    padding:9px 16px;
    border-radius:8px;
    border:1px solid var(--border);
    background: rgba(216,238,169,.08);
    color: var(--accent);
    cursor:pointer;
    font-weight:600;
    font-size:13px;
    letter-spacing:.3px;
    transition: background .15s, border-color .15s;
  }
  button:hover{
    background: rgba(216,238,169,.14);
    border-color: rgba(216,238,169,.4);
  }

  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .chart{height:420px}

  /* KPIs */
  .kpi{
    font-size:24px;
    font-weight:700;
    margin-top:8px;
    letter-spacing:-.5px;
  }
  .kpiAccent{ color: var(--accent); }
  .kpiAccent2{ color: var(--accent3); }

  .topRow{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }
  .pill{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:8px 12px;
    border:1px solid var(--border);
    border-radius:999px;
    background: rgba(26,26,24,.7);
    color: var(--muted);
    font-size:12px;
  }
</style>
</head>

<body>
<div class="container">

  <!-- Header com logo Leto -->

    </svg>
    <div class="header-divider"></div>
    <span class="page-label">Constrained-Off</span>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-meta-inline">
        <span id="pld-date">PLD atualizado até: —</span>
        <span id="ons-date">Dados ONS atualizados até: —</span>
      </div>
      <button id="btnReload">Recarregar</button>
    </div>
    <div class="card-status">
      <span id="status">Carregando...</span>
    </div>
  </div>

  <div class="card">
    <h2>Filtros</h2>
    <div class="grid">

      <div>
        <label>Modalidade</label>
        <select id="reason">
          <option value="ALL">Todas</option>
          <option value="REL">REL</option>
          <option value="ENE">ENE</option>
          <option value="CNF">CNF</option>
          <option value="SEM">SEM</option>
        </select>
      </div>

      <div>
        <label>Tipo</label>
        <select id="tipo">
          <option value="ALL">Todos</option>
        </select>
      </div>

      <div>
        <label>Empresa</label>
        <select id="company" multiple size="5"></select>
        <small>Ctrl para selecionar várias empresas</small>
      </div>

      <div>
        <label>Nome da usina</label>
        <input id="idSearch" placeholder="buscar usina...">
        <select id="idons" multiple size="5"></select>
        <small>Ctrl para selecionar vários</small>
      </div>

    </div>

    <div class="grid2" style="margin-top:12px">
      <div>
        <label>Mês inicial</label>
        <select id="fromMonth"></select>
      </div>
      <div>
        <label>Mês final</label>
        <select id="toMonth"></select>
      </div>
    </div>

    <div style="margin-top:12px;display:flex;gap:8px">
      <button id="apply" class="btn">Aplicar</button>
      <button id="clear" class="btn" style="color:var(--muted);background:transparent">Limpar</button>
    </div>
  </div>

  <div class="grid" style="grid-template-columns:repeat(4,1fr);gap:12px">
    <div class="card">
      <h3>% corte</h3>
      <div id="kpiPct" class="kpi kpiAccent">—</div>
    </div>
    <div class="card">
      <h3>Corte (MWh)</h3>
      <div id="kpiCut" class="kpi">—</div>
    </div>
    <div class="card">
      <h3>Referência (MWh)</h3>
      <div id="kpiRef" class="kpi">—</div>
    </div>
    <div class="card">
      <h3>Impacto Financeiro (R$ mm)</h3>
      <div id="kpiImpact" class="kpi kpiAccent2">—</div>
      <small id="kpiImpactNote"></small>
    </div>
  </div>

  <div class="card">
    <h2>Evolução mensal</h2>
    <div id="chartMonthly" class="chart"></div>
  </div>

  <div class="card">
    <h2>Quebra por modalidade</h2>
    <div id="chartReason" class="chart"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="./app.js"></script>
</body>
</html>
